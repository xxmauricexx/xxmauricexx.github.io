          <div class="widget-title">last played</div>
          <!-- stats.fm embed goes here — replace src with your actual widget -->
          <div class="placeholder-embed">
            <div id="now-playing">Loading...</div>
              <script>
              const username = "maur1c333";
              const apiKey = " 	b2d2df6795ccf1569518e65444d5727d";
              
              async function loadNowPlaying() {
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=1`;
              
                const res = await fetch(url);
                const data = await res.json();
              
                const track = data.recenttracks.track[0];
                const el = document.getElementById("now-playing");
                const image = track.image[2]["#text"];
              
                if (track["@attr"] && track["@attr"].nowplaying === "true") {
                  el.innerHTML = `
                    <img src="${image}" width="150"><br>
                    <strong>🔴 now playing !</strong><br>
                    ${track.name} – ${track.artist["#text"]}
                  `;
                } else {
                  el.innerHTML = `
                    <img src="${image}" width="150"><br>
                    ${track.name} – ${track.artist["#text"]}
                  `;
                }
              }
              loadNowPlaying();
              setInterval(loadNowPlaying, 10000);
              </script>

		<div class="widget">

      <!-- main content -->
      <main class="main-content">
        
        <!-- discogs section -->
        <div class="embed-section" style="border-color: var(--accent3);">
          <h2 style="color: var(--accent3);">physical media</h2>
 
          <div class="placeholder-embed" style="padding: 20px; text-align: center;">
			<div>
			  <select id="sort">
				<option value="newest">newest first</option>
				<option value="oldest">oldest first</option>
				<option value="artist">artist [ a–z ]</option>
				<option value="title">title [ a–z ]</option>
			  </select>
			</div>

			<div id="collection"></div>

			<style>
			#collection {
			  display: grid;
			  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
			  gap: 5px;

			  height: 400px;
			  overflow-y: scroll;

			  padding: 10px;
			  box-sizing: border-box;
			}

			.record {
			  text-align: center;
			  font-size: 0.85rem;
			}

			.record img {
			  width: 100%;
			  border-radius: 0px;
			}
			</style>

			<script>
			let allReleases = [];
			let currentReleases = [];
			let visibleCount = 50;

			// fetch all pages
			async function fetchAllReleases() {
			  let page = 1;
			  let totalPages = 1;
			  let all = [];

			  while (page <= totalPages) {
				const res = await fetch(
				  `https://api.discogs.com/users/ewanmorris2402/collection/folders/0/releases?page=${page}&per_page=100&sort=added&sort_order=desc`,
				  {
					headers: { 'User-Agent': 'MySite/1.0' }
				  }
				);

				const data = await res.json();

				all = all.concat(data.releases);
				totalPages = data.pagination.pages;

				page++;
			  }

			  return all;
			}

			// render grid
			function render() {
			  const container = document.getElementById('collection');
			  container.innerHTML = '';

			  currentReleases.slice(0, visibleCount).forEach(item => {
				const div = document.createElement('div');
				div.className = 'record';

				const info = item.basic_information;

				const formats = info.formats
				  ? [...new Set(info.formats.map(f => f.name))].join(", ")
				  : "";

				div.innerHTML = `
				  <img src="${info.cover_image || ''}">
				  <p>${info.artists[0].name}</p>
				  <p>${info.title}</p>
				  <p style="opacity:0.6; font-size:0.8rem;">${formats}</p>
				`;

				container.appendChild(div);
			  });
			}

			// sorting
			function sortReleases(releases, type) {
			  const sorted = [...releases];

			  if (type === "artist") {
				sorted.sort((a, b) =>
				  a.basic_information.artists[0].name
					.localeCompare(b.basic_information.artists[0].name)
				);
			  }

			  if (type === "title") {
				sorted.sort((a, b) =>
				  a.basic_information.title
					.localeCompare(b.basic_information.title)
				);
			  }

			  if (type === "oldest") {
				sorted.reverse();
			  }

			  return sorted;
			}

			// init
			document.addEventListener("DOMContentLoaded", () => {

			  fetchAllReleases().then(releases => {
				allReleases = releases;
				currentReleases = releases;
				render();
			  });

			  // sorting
			  document.getElementById('sort').addEventListener('change', (e) => {
				visibleCount = 50;
				currentReleases = sortReleases(allReleases, e.target.value);
				render();
			  });

			  // infinite scroll
			  document.getElementById('collection').addEventListener('scroll', () => {
				const el = document.getElementById('collection');

				if (el.scrollTop + el.clientHeight >= el.scrollHeight - 50) {
				  if (visibleCount >= currentReleases.length) return;

				  visibleCount += 50;
				  render();
				}
			  });

			});
			</script>

            <p style="margin-top:8px">
              <a href="https://www.discogs.com/user/ewanmorris2402/collection">view on discogs</a>
            </p>
